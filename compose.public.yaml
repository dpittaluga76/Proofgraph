name: proofgraph-public

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=40"]
    env_file:
      - ${PROOFGRAPH_ENV_FILE:-.env.public}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - proofgraph-public-postgres:/var/lib/postgresql/data

  web:
    image: proofgraph-public-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${PROOFGRAPH_ENV_FILE:-.env.public}
    command:
      - /bin/sh
      - -c
      - >-
        python manage.py migrate --noinput &&
        exec python -m uvicorn proofgraph.asgi:application
        --host 0.0.0.0 --port 8000
        --proxy-headers --forwarded-allow-ips '*'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import os, urllib.request;
          host = os.environ['DJANGO_ALLOWED_HOSTS'].split(',')[0].strip();
          request = urllib.request.Request(
              'http://127.0.0.1:8000/api/health', headers={'Host': host}
          );
          urllib.request.urlopen(request, timeout=5).read()
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    ports:
      - "127.0.0.1:8000:8000"

  worker:
    image: proofgraph-public-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${PROOFGRAPH_ENV_FILE:-.env.public}
    command: ["python", "manage.py", "run_generation_worker"]
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_healthy

volumes:
  proofgraph-public-postgres:
